<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autenticação - Benetrip</title>

    <!-- Supabase Config -->
    <meta name="supabase-url" content="https://dlccjeazkpxtijevusbp.supabase.co">
    <meta name="supabase-anon-key" content="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsY2NqZWF6a3B4dGlqZXZ1c2JwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Mjg3MDYsImV4cCI6MjA4NzMwNDcwNn0.lwKwqF74JrHOaghkcbysZQN8jWErVVwPnxzLG7t07QU">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #E87722 0%, #00A3E0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .callback-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }
        .callback-mascot { font-size: 48px; margin-bottom: 16px; }
        .callback-title {
            font-family: 'Poppins', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #21272A;
            margin-bottom: 8px;
        }
        .callback-message {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .callback-spinner {
            width: 32px; height: 32px;
            border: 3px solid #E0E0E0;
            border-top: 3px solid #E87722;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .callback-error {
            color: #E53935;
            background: #FFEBEE;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .callback-btn {
            display: inline-block;
            padding: 12px 32px;
            background: #E87722;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
        }
        .callback-btn:hover { background: #D06A1D; }
    </style>
</head>
<body>
    <div class="callback-card">
        <div class="callback-mascot">🐕</div>
        <div id="loading-state">
            <div class="callback-spinner"></div>
            <h1 class="callback-title">Quase lá!</h1>
            <p class="callback-message">A Tripinha está confirmando seus dados...</p>
        </div>
        <div id="success-state" style="display:none;">
            <h1 class="callback-title">Tudo certo! 🎉</h1>
            <p class="callback-message">Sua conta foi confirmada. Redirecionando...</p>
        </div>
        <div id="error-state" style="display:none;">
            <h1 class="callback-title">Ops! Algo deu errado 😅</h1>
            <div class="callback-error" id="error-message"></div>
            <a href="/" class="callback-btn">Voltar para a Benetrip</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        /**
         * Auth Callback - Implicit Flow
         * 
         * Com flowType: 'implicit', o OAuth retorna tokens diretamente no hash da URL:
         *   /auth-callback.html#access_token=xxx&refresh_token=yyy&...
         * 
         * O SDK com detectSessionInUrl: true lê esses tokens automaticamente
         * e dispara o evento SIGNED_IN. Sem code exchange, sem Navigator Locks.
         */
        (function() {
            const supabaseUrl = document.querySelector('meta[name="supabase-url"]')?.content?.trim();
            const supabaseAnonKey = document.querySelector('meta[name="supabase-anon-key"]')?.content?.trim();

            if (!supabaseUrl || !supabaseAnonKey) {
                showError('Supabase não configurado.');
                return;
            }

            // Criar client — detectSessionInUrl lê os tokens do hash automaticamente
            const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey, {
                auth: {
                    autoRefreshToken: true,
                    persistSession: true,
                    detectSessionInUrl: true,
                    flowType: 'implicit'
                }
            });

            const params = new URLSearchParams(window.location.search);
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            const type = params.get('type') || hashParams.get('type');
            let handled = false;

            // Timeout de segurança
            const timeout = setTimeout(() => {
                if (!handled) {
                    showError('Tempo esgotado. Tente fazer login novamente.');
                }
            }, 12000);

            // Escutar evento de auth
            supabaseClient.auth.onAuthStateChange((event, session) => {
                console.log('[AuthCallback] Auth event:', event);

                if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session && !handled) {
                    handled = true;
                    clearTimeout(timeout);
                    showSuccess(type);
                }
            });

            // Fallback: verificar sessão existente
            supabaseClient.auth.getSession().then(({ data, error }) => {
                if (data?.session && !handled) {
                    handled = true;
                    clearTimeout(timeout);
                    showSuccess(type);
                }
                // Se não há sessão e não há hash tokens, vai cair no timeout
            });

            function showSuccess(callbackType) {
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('success-state').style.display = 'block';

                const redirectTo = callbackType === 'recovery' ? '/redefinir-senha.html' : '/';
                setTimeout(() => {
                    window.location.href = redirectTo;
                }, 1500);
            }

            function showError(msg) {
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('error-state').style.display = 'block';
                document.getElementById('error-message').textContent = msg;
                document.getElementById('error-message').style.display = 'block';
            }
        })();
    </script>
</body>
</html>
